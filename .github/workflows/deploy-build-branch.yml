name: Build and Deploy to build branch

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".editorconfig"
      - ".github/**"
      - ".gitignore"
      - ".husky/**"
      - ".prettierignore"
      - ".prettierrc"
      - "Caddyfile"
      - "Dockerfile"
      - "docs/**"
      - "eslint.config.mjs"
      - "README.md"

  workflow_run:
    workflows: ["Dependabot auto-merge"]
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{github.ref}}
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build version metadata
        run: |
          BUILD_DATE=$(TZ=UTC date +'%Y-%m-%d')
          BUILD_SEQUENCE=$(git rev-list --count --since="${BUILD_DATE}T00:00:00Z" HEAD)

          echo "VERSION_BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "VERSION_BUILD_SEQUENCE=${BUILD_SEQUENCE}" >> $GITHUB_ENV
          echo "VERSION_CHANNEL=main" >> $GITHUB_ENV
          echo "VERSION_GIT_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "VERSION_IS_CANONICAL=true" >> $GITHUB_ENV

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: build
          folder: build
          git-config-name: github-actions[bot]
          git-config-email: 41898282+github-actions[bot]@users.noreply.github.com
